{% extends 'base.html' %}
{% block title %}Register – UzPost{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card p-4 mt-3">
      <h3 class="text-center mb-4 fw-bold text-primary"><i class="bi bi-person-plus me-2"></i>Create Account</h3>
      <form method="post">
        {% csrf_token %}
        {% for field in form %}
          <div class="mb-3">
            <label class="form-label fw-semibold">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
              <div class="text-danger small mt-1">{{ field.errors.as_text }}</div>
            {% endif %}
          </div>
        {% endfor %}
        <button class="btn btn-primary w-100 py-2 mt-2">Register</button>
      </form>
      <p class="text-center mt-3 text-muted">
        Already have an account? <a href="{% url 'users:login' %}">Login</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
